<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imago — Image to PDF Converter</title>
  <link rel="stylesheet" href="style.css" />
  <!-- jsPDF for PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- SortableJS for drag-to-reorder -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
</head>
<body>

  <!-- ── HEADER ─────────────────────────────────────────────── -->
  <header class="site-header">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect x="2" y="2" width="17" height="22" rx="2" fill="var(--accent)"/>
        <rect x="9" y="7" width="17" height="22" rx="2" fill="var(--glass-border)" stroke="var(--accent)" stroke-width="1.5"/>
        <path d="M13 14l3 4 4-6" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="logo-text">Imago</span>
    </div>
    <div class="header-controls">
      <button class="icon-btn" id="themeToggle" title="Toggle theme" aria-label="Toggle dark/light mode">
        <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── HERO ───────────────────────────────────────────────── -->
  <section class="hero">
    <h1 class="hero-title">Images <span class="accent-word">→</span> PDF</h1>
    <p class="hero-sub">Drag, arrange, configure, convert. All in your browser. No uploads, no servers.</p>
  </section>

  <!-- ── MAIN LAYOUT ────────────────────────────────────────── -->
  <main class="app-layout">

    <!-- LEFT: Drop Zone + Preview Grid -->
    <section class="panel panel-left">

      <!-- Drop Zone -->
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" multiple accept="image/jpeg,image/png,image/webp" hidden />
        <div class="drop-inner">
          <div class="drop-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <rect x="4" y="8" width="28" height="34" rx="3" fill="var(--accent-dim)"/>
              <rect x="16" y="4" width="28" height="34" rx="3" fill="none" stroke="var(--accent)" stroke-width="2" stroke-dasharray="5 3"/>
              <path d="M30 18v10M25 23h10" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
          </div>
          <p class="drop-main">Drop images here</p>
          <p class="drop-sub">or <button class="link-btn" id="browseBtn">browse files</button></p>
          <p class="drop-hint">JPG · PNG · WebP · Multiple allowed</p>
        </div>
      </div>

      <!-- Stats Bar -->
      <div class="stats-bar" id="statsBar" style="display:none">
        <span id="statCount">0 images</span>
        <span class="stat-sep">·</span>
        <span id="statSize">0 KB</span>
        <div class="stats-actions">
          <button class="text-btn danger" id="clearAllBtn">Clear all</button>
        </div>
      </div>

      <!-- Preview Grid -->
      <div class="preview-grid" id="previewGrid">
        <!-- Cards injected by JS -->
      </div>

    </section>

    <!-- RIGHT: Settings Panel -->
    <aside class="panel panel-right">
      <h2 class="panel-title">PDF Settings</h2>

      <!-- Page Size -->
      <div class="setting-group">
        <label class="setting-label">Page Size</label>
        <div class="chip-group" id="pageSizeGroup">
          <button class="chip active" data-val="a4">A4</button>
          <button class="chip" data-val="letter">Letter</button>
        </div>
      </div>

      <!-- Orientation -->
      <div class="setting-group">
        <label class="setting-label">Orientation</label>
        <div class="chip-group" id="orientGroup">
          <button class="chip active" data-val="portrait">
            <svg width="12" height="16" viewBox="0 0 12 16"><rect x="1" y="1" width="10" height="14" rx="1.5" fill="currentColor" opacity=".2" stroke="currentColor" stroke-width="1.5"/></svg>
            Portrait
          </button>
          <button class="chip" data-val="landscape">
            <svg width="16" height="12" viewBox="0 0 16 12"><rect x="1" y="1" width="14" height="10" rx="1.5" fill="currentColor" opacity=".2" stroke="currentColor" stroke-width="1.5"/></svg>
            Landscape
          </button>
        </div>
      </div>

      <!-- Margin -->
      <div class="setting-group">
        <label class="setting-label">Margin</label>
        <div class="chip-group" id="marginGroup">
          <button class="chip active" data-val="10">Small</button>
          <button class="chip" data-val="20">Medium</button>
          <button class="chip" data-val="30">Large</button>
        </div>
      </div>

      <!-- Image Fit -->
      <div class="setting-group">
        <label class="setting-label">Image Fit</label>
        <div class="chip-group" id="fitGroup">
          <button class="chip active" data-val="fit">Fit</button>
          <button class="chip" data-val="fill">Fill</button>
          <button class="chip" data-val="stretch">Stretch</button>
        </div>
      </div>

      <!-- Quality -->
      <div class="setting-group">
        <label class="setting-label">
          Quality
          <span class="setting-value" id="qualityVal">90%</span>
        </label>
        <div class="slider-track">
          <input type="range" id="qualitySlider" min="50" max="100" value="90" step="5" />
        </div>
      </div>

      <!-- Toggles -->
      <div class="setting-group">
        <label class="setting-label">Options</label>
        <div class="toggle-list">
          <label class="toggle-row">
            <span>Page numbers</span>
            <input type="checkbox" id="pageNumToggle" class="toggle-input" />
            <span class="toggle-thumb"></span>
          </label>
          <label class="toggle-row">
            <span>Filename as title</span>
            <input type="checkbox" id="titleToggle" class="toggle-input" checked />
            <span class="toggle-thumb"></span>
          </label>
        </div>
      </div>

      <!-- PDF Filename -->
      <div class="setting-group">
        <label class="setting-label">Output Filename</label>
        <input type="text" id="filenameInput" class="text-input" value="converted" placeholder="filename" />
        <span class="input-suffix">.pdf</span>
      </div>

      <!-- Divider -->
      <div class="divider"></div>

      <!-- Convert Button -->
      <button class="btn-primary" id="convertBtn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Convert to PDF
      </button>

      <!-- Progress -->
      <div class="progress-wrap" id="progressWrap" style="display:none">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <span class="progress-label" id="progressLabel">Processing…</span>
      </div>

      <!-- Download Button -->
      <button class="btn-secondary" id="downloadBtn" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download PDF
      </button>

      <!-- Preview Button -->
      <button class="btn-ghost" id="previewPdfBtn" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        Preview PDF
      </button>

    </aside>
  </main>

  <!-- ── PDF PREVIEW MODAL ──────────────────────────────────── -->
  <div class="modal-overlay" id="previewModal" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">PDF Preview</span>
        <button class="icon-btn" id="closeModal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <iframe id="previewFrame" title="PDF Preview"></iframe>
      </div>
    </div>
  </div>

  <!-- ── TOAST ──────────────────────────────────────────────── -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
